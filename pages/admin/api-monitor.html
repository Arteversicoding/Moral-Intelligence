<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>API Key Monitor - Moral Intelligence</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; }
        .key-available { background-color: #10b981; }
        .key-limited { background-color: #f59e0b; }
        .key-blocked { background-color: #ef4444; }
        .progress-bar {
            transition: width 0.3s ease;
        }
    </style>
</head>
<body class="min-h-screen bg-gradient-to-br from-slate-50 via-indigo-50 to-purple-100">

    <div class="container mx-auto px-4 py-8 max-w-6xl">
        <!-- Header -->
        <div class="bg-white rounded-2xl shadow-xl p-6 mb-6">
            <div class="flex items-center justify-between">
                <div>
                    <h1 class="text-3xl font-bold text-gray-800">🔑 API Key Monitor</h1>
                    <p class="text-gray-600 mt-1">Real-time monitoring untuk semua API keys</p>
                </div>
                <a href="admin-dashboard.html" class="bg-indigo-100 hover:bg-indigo-200 text-indigo-700 px-4 py-2 rounded-lg font-medium transition-colors">
                    ← Kembali
                </a>
            </div>
        </div>

        <!-- Overall Stats -->
        <div class="grid grid-cols-1 md:grid-cols-4 gap-4 mb-6">
            <div class="bg-white rounded-xl shadow-lg p-6">
                <div class="text-gray-600 text-sm font-medium mb-1">Total Keys</div>
                <div id="total-keys" class="text-3xl font-bold text-indigo-600">-</div>
            </div>
            <div class="bg-white rounded-xl shadow-lg p-6">
                <div class="text-gray-600 text-sm font-medium mb-1">Available Keys</div>
                <div id="available-keys" class="text-3xl font-bold text-green-600">-</div>
            </div>
            <div class="bg-white rounded-xl shadow-lg p-6">
                <div class="text-gray-600 text-sm font-medium mb-1">Total Requests</div>
                <div id="total-requests" class="text-3xl font-bold text-blue-600">-</div>
            </div>
            <div class="bg-white rounded-xl shadow-lg p-6">
                <div class="text-gray-600 text-sm font-medium mb-1">Daily Capacity</div>
                <div id="daily-capacity" class="text-3xl font-bold text-purple-600">-</div>
            </div>
        </div>

        <!-- Current Active Key -->
        <div class="bg-gradient-to-r from-indigo-600 to-purple-600 text-white rounded-xl shadow-lg p-6 mb-6">
            <div class="flex items-center justify-between">
                <div>
                    <div class="text-indigo-100 text-sm font-medium mb-1">Currently Active</div>
                    <div class="text-3xl font-bold">API Key #<span id="current-key">-</span></div>
                </div>
                <div class="text-right">
                    <button onclick="forceRotate()" class="bg-white/20 hover:bg-white/30 px-4 py-2 rounded-lg font-medium transition-colors">
                        🔄 Force Rotate
                    </button>
                </div>
            </div>
        </div>

        <!-- Actions -->
        <div class="bg-white rounded-xl shadow-lg p-6 mb-6">
            <h2 class="text-xl font-bold text-gray-800 mb-4">Quick Actions</h2>
            <div class="flex flex-wrap gap-3">
                <button onclick="refreshStats()" class="bg-blue-500 hover:bg-blue-600 text-white px-6 py-2 rounded-lg font-medium transition-colors">
                    🔄 Refresh Stats
                </button>
                <button onclick="resetAllBlocked()" class="bg-orange-500 hover:bg-orange-600 text-white px-6 py-2 rounded-lg font-medium transition-colors">
                    🔓 Reset Blocked Keys
                </button>
                <button onclick="clearAllStats()" class="bg-red-500 hover:bg-red-600 text-white px-6 py-2 rounded-lg font-medium transition-colors">
                    🗑️ Clear All Stats
                </button>
                <button onclick="exportStats()" class="bg-green-500 hover:bg-green-600 text-white px-6 py-2 rounded-lg font-medium transition-colors">
                    📊 Export Data
                </button>
            </div>
        </div>

        <!-- Individual Key Stats -->
        <div class="bg-white rounded-xl shadow-lg p-6">
            <h2 class="text-xl font-bold text-gray-800 mb-4">Individual Key Statistics</h2>
            <div id="key-list" class="space-y-3">
                <!-- Will be populated by JavaScript -->
            </div>
        </div>
    </div>

    <script type="module">
        import { apiKeyManager } from '../../config/config.js';

        // Refresh stats display
        function updateDisplay() {
            const stats = apiKeyManager.getOverallStats();

            document.getElementById('total-keys').textContent = stats.totalKeys;
            document.getElementById('available-keys').textContent = stats.availableKeys;
            document.getElementById('total-requests').textContent = stats.totalRequests;
            document.getElementById('daily-capacity').textContent = stats.maxDailyCapacity;
            document.getElementById('current-key').textContent = stats.currentKey;

            // Update individual keys
            const keyListContainer = document.getElementById('key-list');
            keyListContainer.innerHTML = '';

            const keyStats = apiKeyManager.keyStats;
            Object.keys(keyStats).forEach(keyIndex => {
                const stat = keyStats[keyIndex];
                const percentage = (stat.dailyCount / 1500 * 100).toFixed(1);
                const isActive = parseInt(keyIndex) === stats.currentKey;

                let statusClass = 'key-available';
                let statusText = 'Available';

                if (stat.isBlocked) {
                    statusClass = 'key-blocked';
                    statusText = 'Blocked';
                } else if (stat.dailyCount >= 1500) {
                    statusClass = 'key-blocked';
                    statusText = 'Limit Reached';
                } else if (stat.dailyCount >= 1200) {
                    statusClass = 'key-limited';
                    statusText = 'Near Limit';
                }

                const keyHTML = `
                    <div class="border ${isActive ? 'border-indigo-500 border-2' : 'border-gray-200'} rounded-lg p-4">
                        <div class="flex items-center justify-between mb-3">
                            <div class="flex items-center gap-3">
                                <div class="w-3 h-3 rounded-full ${statusClass}"></div>
                                <div>
                                    <div class="font-bold text-gray-800">
                                        API Key #${keyIndex}
                                        ${isActive ? '<span class="text-xs bg-indigo-100 text-indigo-700 px-2 py-1 rounded-full ml-2">ACTIVE</span>' : ''}
                                    </div>
                                    <div class="text-xs text-gray-500">${statusText}</div>
                                </div>
                            </div>
                            <div class="text-right">
                                <div class="text-xl font-bold text-gray-800">${stat.dailyCount} / 1500</div>
                                <div class="text-xs text-gray-500">requests today</div>
                            </div>
                        </div>

                        <!-- Progress Bar -->
                        <div class="w-full bg-gray-200 rounded-full h-2 mb-2">
                            <div class="progress-bar ${statusClass} h-2 rounded-full" style="width: ${percentage}%"></div>
                        </div>

                        <!-- Additional Info -->
                        <div class="flex justify-between text-xs text-gray-600 mt-2">
                            <span>Failures: ${stat.failCount}</span>
                            <span>Last Reset: ${stat.lastReset}</span>
                        </div>
                    </div>
                `;

                keyListContainer.insertAdjacentHTML('beforeend', keyHTML);
            });
        }

        // Force rotate to next key
        window.forceRotate = function() {
            const rotated = apiKeyManager.rotateToNextKey();
            if (rotated) {
                alert(`✅ Rotated to API Key #${apiKeyManager.getCurrentKeyIndex()}`);
                updateDisplay();
            } else {
                alert('❌ No available keys to rotate to!');
            }
        };

        // Reset all blocked keys
        window.resetAllBlocked = function() {
            if (confirm('Reset semua blocked keys?')) {
                apiKeyManager.resetBlockedKeys();
                alert('✅ Semua blocked keys telah direset!');
                updateDisplay();
            }
        };

        // Clear all stats
        window.clearAllStats = function() {
            if (confirm('⚠️ Hapus semua statistik? Ini akan mereset semua counter!')) {
                localStorage.removeItem('gemini_key_stats');
                localStorage.removeItem('gemini_current_key_index');
                alert('✅ Semua statistik telah dihapus!');
                location.reload();
            }
        };

        // Export stats as JSON
        window.exportStats = function() {
            const stats = {
                overall: apiKeyManager.getOverallStats(),
                keyStats: apiKeyManager.keyStats,
                timestamp: new Date().toISOString()
            };

            const dataStr = JSON.stringify(stats, null, 2);
            const dataBlob = new Blob([dataStr], { type: 'application/json' });
            const url = URL.createObjectURL(dataBlob);

            const link = document.createElement('a');
            link.href = url;
            link.download = `api-stats-${Date.now()}.json`;
            link.click();

            URL.revokeObjectURL(url);
        };

        // Refresh stats
        window.refreshStats = function() {
            updateDisplay();
            alert('✅ Stats refreshed!');
        };

        // Auto-refresh every 5 seconds
        setInterval(updateDisplay, 5000);

        // Initial load
        updateDisplay();
    </script>
</body>
</html>
